<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#101826"/>
    </linearGradient>
    <radialGradient id="glowC" cx="20%" cy="10%" r="70%">
      <stop offset="0" stop-color="#00f5ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#00f5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowM" cx="85%" cy="25%" r="70%">
      <stop offset="0" stop-color="#ff00aa" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ff00aa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#00f5ff" fill-opacity="0.08"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glowC)"/>
  <rect width="1200" height="675" fill="url(#glowM)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <!-- scanlines -->
  <g opacity="0.35">
    <rect y="0" width="1200" height="3" fill="#000">
      <animate attributeName="y" values="0;675" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <rect y="250" width="1200" height="2" fill="#000" opacity="0.55">
      <animate attributeName="y" values="250;925" dur="2.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- frame -->
  <rect x="40" y="40" width="1120" height="595" rx="16" fill="#0d1117" fill-opacity="0.80" stroke="#00f5ff" stroke-opacity="0.35"/>
  <rect x="44" y="44" width="1112" height="587" rx="14" fill="none" stroke="#00f5ff" stroke-opacity="0.18"/>

  <text x="70" y="105" fill="#00f5ff" font-family="Consolas, Menlo, monospace" font-size="26" font-weight="700">
    PYGAME DEMO PLACEHOLDER
  </text>
  <text x="70" y="145" fill="#7a9bb5" font-family="Consolas, Menlo, monospace" font-size="16">
    Drop a real GIF/MP4 into mind-dashboard/public/ and update the src in app/ui.tsx
  </text>

  <!-- mock jitter vs stable -->
  <g transform="translate(70,190)">
    <text x="0" y="0" fill="#ff00aa" font-family="Consolas, Menlo, monospace" font-size="16">jittery baseline</text>
    <text x="540" y="0" fill="#00f5ff" font-family="Consolas, Menlo, monospace" font-size="16">stable ensemble + gate</text>

    <rect x="0" y="18" width="500" height="220" rx="12" fill="#101826" stroke="#00f5ff" stroke-opacity="0.20"/>
    <rect x="540" y="18" width="500" height="220" rx="12" fill="#101826" stroke="#00f5ff" stroke-opacity="0.20"/>

    <!-- jitter dots -->
    <g>
      <circle cx="60" cy="90" r="4" fill="#ff00aa" filter="url(#soft)">
        <animate attributeName="cy" values="80;160;70;140;90" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="110" cy="120" r="4" fill="#ff00aa" filter="url(#soft)">
        <animate attributeName="cy" values="150;100;170;90;120" dur="1.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="160" cy="100" r="4" fill="#ff00aa" filter="url(#soft)">
        <animate attributeName="cy" values="60;170;110;150;100" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="210" cy="140" r="4" fill="#ff00aa" filter="url(#soft)">
        <animate attributeName="cy" values="140;90;160;70;140" dur="1.3s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- stable line + gate -->
    <path d="M560 190 C 610 165, 660 155, 710 150 S 810 150, 860 140 S 960 125, 1040 120" fill="none" stroke="#00f5ff" stroke-opacity="0.95" stroke-width="3"/>
    <line x1="560" y1="150" x2="1040" y2="150" stroke="#ff00aa" stroke-opacity="0.70" stroke-dasharray="6,6"/>
    <text x="560" y="262" fill="#7a9bb5" font-family="Consolas, Menlo, monospace" font-size="14">gate threshold</text>
  </g>

  <!-- hand mock -->
  <g transform="translate(70,455)">
    <rect x="0" y="0" width="500" height="150" rx="12" fill="#101826" stroke="#00f5ff" stroke-opacity="0.20"/>
    <text x="18" y="34" fill="#00f5ff" font-family="Consolas, Menlo, monospace" font-size="16">hand output</text>
    <rect x="390" y="18" width="92" height="30" rx="15" fill="#0d1117" stroke="#50dc8c" stroke-opacity="0.8"/>
    <text x="408" y="39" fill="#50dc8c" font-family="Consolas, Menlo, monospace" font-size="14">FIRE</text>
    <rect x="160" y="58" width="120" height="80" rx="14" fill="#50dc8c" fill-opacity="0.8" stroke="#00f5ff" stroke-opacity="0.35"/>
    <rect x="160" y="18" width="18" height="46" rx="9" fill="#50dc8c" fill-opacity="0.8"/>
    <rect x="186" y="12" width="18" height="52" rx="9" fill="#50dc8c" fill-opacity="0.8"/>
    <rect x="212" y="8" width="18" height="56" rx="9" fill="#50dc8c" fill-opacity="0.8"/>
    <rect x="238" y="12" width="18" height="52" rx="9" fill="#50dc8c" fill-opacity="0.8"/>
    <rect x="264" y="18" width="18" height="46" rx="9" fill="#50dc8c" fill-opacity="0.8"/>
  </g>

</svg>

